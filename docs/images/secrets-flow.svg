<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0aec0"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dd6b20"/>
    </marker>
  </defs>

  <rect width="720" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Column headers -->
  <text x="120" y="25" text-anchor="middle" fill="#718096" font-size="11" font-weight="600" letter-spacing="1">GITHUB SECRETS</text>
  <text x="380" y="25" text-anchor="middle" fill="#718096" font-size="11" font-weight="600" letter-spacing="1">AWS (RUNTIME)</text>
  <text x="600" y="25" text-anchor="middle" fill="#718096" font-size="11" font-weight="600" letter-spacing="1">KUBERNETES</text>

  <!-- Vertical dividers -->
  <line x1="245" y1="15" x2="245" y2="285" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="500" y1="15" x2="500" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <!-- GitHub: AWS_DEPLOY_ROLE_ARN -->
  <rect x="20" y="45" width="210" height="36" rx="6" fill="#2d3748" filter="url(#s)"/>
  <text x="125" y="67" text-anchor="middle" fill="white" font-weight="600" font-size="11">AWS_DEPLOY_ROLE_ARN</text>

  <!-- Arrow: OIDC -->
  <line x1="232" y1="63" x2="278" y2="63" stroke="#dd6b20" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="255" y="55" fill="#dd6b20" font-size="9" font-weight="600">OIDC</text>

  <!-- AWS: IAM Role -->
  <rect x="283" y="45" width="120" height="36" rx="6" fill="#4a7fb5" filter="url(#s)"/>
  <text x="343" y="67" text-anchor="middle" fill="white" font-weight="600" font-size="11">IAM Role</text>

  <!-- Arrow: to EKS -->
  <line x1="405" y1="63" x2="438" y2="63" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- AWS: EKS kubeconfig -->
  <rect x="443" y="45" width="120" height="36" rx="6" fill="#4a7fb5" filter="url(#s)"/>
  <text x="503" y="67" text-anchor="middle" fill="white" font-weight="600" font-size="11">EKS kubeconfig</text>

  <!-- GitHub: GITHUB_TOKEN -->
  <rect x="20" y="105" width="210" height="36" rx="6" fill="#2d3748" filter="url(#s)"/>
  <text x="125" y="127" text-anchor="middle" fill="white" font-weight="600" font-size="11">GITHUB_TOKEN</text>

  <!-- Arrow: to GHCR -->
  <line x1="232" y1="123" x2="278" y2="123" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- AWS: GHCR registry -->
  <rect x="283" y="105" width="120" height="36" rx="6" fill="#4a7fb5" filter="url(#s)"/>
  <text x="343" y="127" text-anchor="middle" fill="white" font-weight="600" font-size="11">GHCR registry</text>

  <!-- K8s: redis-credentials -->
  <rect x="520" y="165" width="180" height="36" rx="6" fill="#c53030" filter="url(#s)"/>
  <text x="610" y="187" text-anchor="middle" fill="white" font-weight="600" font-size="11">redis-credentials (Secret)</text>

  <!-- Label for manual/ESO -->
  <text x="610" y="215" text-anchor="middle" fill="#718096" font-size="10">manual or External Secrets Operator</text>

  <!-- K8s: Pod env vars -->
  <rect x="520" y="235" width="180" height="50" rx="6" fill="#edf2f7" stroke="#d0d8e0" stroke-width="1"/>
  <text x="610" y="255" text-anchor="middle" fill="#2d3748" font-weight="600" font-size="11">Pod environment</text>
  <text x="610" y="273" text-anchor="middle" fill="#718096" font-size="10">REDIS_PASSWORD, APP_PORT, ...</text>

  <!-- Arrow: secret to pod -->
  <line x1="610" y1="201" x2="610" y2="233" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Note box -->
  <rect x="20" y="180" width="210" height="70" rx="6" fill="#edf2f7"/>
  <text x="30" y="200" fill="#4a5568" font-size="10" font-weight="600">No secrets cross boundaries:</text>
  <text x="30" y="216" fill="#718096" font-size="10">CI never sees Redis password</text>
  <text x="30" y="232" fill="#718096" font-size="10">AWS creds are ephemeral (~1h TTL)</text>
  <text x="30" y="248" fill="#718096" font-size="10">Nothing logged or written to disk</text>
</svg>
