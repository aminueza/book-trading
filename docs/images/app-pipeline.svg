<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 80" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0aec0"/>
    </marker>
  </defs>

  <rect width="700" height="80" fill="#f8f9fa" rx="8"/>

  <!-- Parallel: lint + test + security -->
  <rect x="15" y="22" width="200" height="36" rx="18" fill="#38a169" filter="url(#s)"/>
  <text x="115" y="44" text-anchor="middle" fill="white" font-weight="600">lint + test + security</text>
  <text x="115" y="56" text-anchor="middle" fill="#c6f6d5" font-size="9">parallel: gosec, -race, Trivy</text>

  <line x1="217" y1="40" x2="248" y2="40" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="253" y="22" width="175" height="36" rx="18" fill="#4a7fb5" filter="url(#s)"/>
  <text x="340" y="44" text-anchor="middle" fill="white" font-weight="600">build</text>
  <text x="340" y="56" text-anchor="middle" fill="#d4e4f7" font-size="9">GHCR + Cosign + SBOM</text>

  <line x1="430" y1="40" x2="461" y2="40" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="466" y="22" width="220" height="36" rx="18" fill="#2d3748" filter="url(#s)"/>
  <text x="576" y="44" text-anchor="middle" fill="white" font-weight="600">rollout</text>
  <text x="576" y="56" text-anchor="middle" fill="#a0aec0" font-size="9">main: approval + health checks</text>
</svg>
