<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a0aec0"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dd6b20"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fa" rx="8"/>

  <!-- ==================== AWS Cloud boundary ==================== -->
  <rect x="15" y="50" width="870" height="555" rx="10" fill="none" stroke="#dd6b20" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="30" y="38" width="120" height="24" rx="4" fill="#dd6b20"/>
  <text x="90" y="55" text-anchor="middle" fill="white" font-weight="700" font-size="12">AWS us-east-1</text>

  <!-- ==================== VPC boundary ==================== -->
  <rect x="35" y="70" width="840" height="520" rx="8" fill="#f0f7ff" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="60" y="90" fill="#4a7fb5" font-weight="700" font-size="11">VPC 10.0.0.0/16</text>
  <text x="230" y="90" fill="#718096" font-size="10">Flow Logs → CloudWatch (30d retention)</text>

  <!-- ==================== Public subnets row ==================== -->
  <rect x="55" y="100" width="800" height="80" rx="6" fill="#fff5eb" stroke="#dd6b20" stroke-width="1" opacity="0.7"/>
  <text x="75" y="118" fill="#dd6b20" font-weight="600" font-size="11">Public Subnets (10.0.101-103.0/24)</text>
  <text x="380" y="118" fill="#718096" font-size="10">ALB/NLB only — no workloads</text>

  <!-- NLB / Istio Ingress -->
  <rect x="300" y="130" width="260" height="40" rx="6" fill="#2d3748" filter="url(#s)"/>
  <text x="430" y="148" text-anchor="middle" fill="white" font-weight="600">NLB → Istio Ingress Gateway</text>
  <text x="430" y="162" text-anchor="middle" fill="#a0aec0" font-size="10">TLS termination | mTLS to pods</text>

  <!-- Internet arrow -->
  <text x="430" y="58" text-anchor="middle" fill="#2d3748" font-weight="600" font-size="11">Internet</text>
  <line x1="430" y1="63" x2="430" y2="128" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ==================== Private subnets row ==================== -->
  <rect x="55" y="195" width="800" height="310" rx="6" fill="#ebf4ff" stroke="#4a7fb5" stroke-width="1" opacity="0.5"/>
  <text x="75" y="215" fill="#4a7fb5" font-weight="600" font-size="11">Private Subnets (10.0.1-3.0/24)</text>
  <text x="340" y="215" fill="#718096" font-size="10">NAT Gateway per AZ for egress</text>

  <!-- ==================== EKS Cluster ==================== -->
  <rect x="70" y="225" width="520" height="265" rx="8" fill="white" stroke="#4a7fb5" stroke-width="1.5"/>
  <text x="90" y="245" fill="#4a7fb5" font-weight="700" font-size="12">EKS: trading-production</text>
  <text x="330" y="245" fill="#718096" font-size="10">v1.29 | private API endpoint | KMS secrets encryption | audit logging</text>

  <!-- System node group -->
  <rect x="85" y="255" width="230" height="55" rx="6" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="200" y="273" text-anchor="middle" fill="#2d3748" font-weight="600" font-size="11">System Nodes (m6i.large)</text>
  <text x="200" y="289" text-anchor="middle" fill="#718096" font-size="10">2-4 nodes | taint: CriticalAddonsOnly</text>
  <text x="200" y="303" text-anchor="middle" fill="#718096" font-size="10">CoreDNS, kube-proxy, Istio</text>

  <!-- Trading node group -->
  <rect x="330" y="255" width="250" height="55" rx="6" fill="#edf2f7" stroke="#4a7fb5" stroke-width="1"/>
  <text x="455" y="273" text-anchor="middle" fill="#2d3748" font-weight="600" font-size="11">Trading Nodes (c6i.xlarge)</text>
  <text x="455" y="289" text-anchor="middle" fill="#718096" font-size="10">3-12 nodes | compute-optimized</text>
  <text x="455" y="303" text-anchor="middle" fill="#718096" font-size="10">HPA 5-20 pods | Cluster Autoscaler</text>

  <!-- Arrow: NLB → Istio → pods -->
  <line x1="430" y1="170" x2="430" y2="318" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Orderbook pods -->
  <rect x="100" y="323" width="120" height="50" rx="6" fill="#4a7fb5" filter="url(#s)"/>
  <text x="160" y="345" text-anchor="middle" fill="white" font-weight="600" font-size="11">orderbook (1)</text>
  <text x="160" y="362" text-anchor="middle" fill="#d4e4f7" font-size="9">Guaranteed QoS</text>

  <rect x="240" y="323" width="120" height="50" rx="6" fill="#4a7fb5" filter="url(#s)"/>
  <text x="300" y="345" text-anchor="middle" fill="white" font-weight="600" font-size="11">orderbook (2)</text>
  <text x="300" y="362" text-anchor="middle" fill="#d4e4f7" font-size="9">Guaranteed QoS</text>

  <rect x="380" y="323" width="120" height="50" rx="6" fill="#4a7fb5" filter="url(#s)"/>
  <text x="440" y="345" text-anchor="middle" fill="white" font-weight="600" font-size="11">orderbook (N)</text>
  <text x="440" y="362" text-anchor="middle" fill="#d4e4f7" font-size="9">Guaranteed QoS</text>

  <!-- NLB fan-out arrows -->
  <line x1="380" y1="318" x2="160" y2="321" stroke="#a0aec0" stroke-width="1"/>
  <line x1="430" y1="318" x2="300" y2="321" stroke="#a0aec0" stroke-width="1"/>
  <line x1="450" y1="318" x2="440" y2="321" stroke="#a0aec0" stroke-width="1"/>

  <!-- K8s properties row -->
  <rect x="85" y="385" width="495" height="30" rx="4" fill="#edf2f7"/>
  <text x="332" y="405" text-anchor="middle" fill="#718096" font-size="10">NetworkPolicy zero-trust | PDB minAvailable=3 | topology spread across AZs | IRSA for pod IAM</text>

  <!-- Namespace labels -->
  <rect x="85" y="420" width="120" height="22" rx="4" fill="#4a7fb5" opacity="0.15"/>
  <text x="145" y="436" text-anchor="middle" fill="#4a7fb5" font-size="10" font-weight="600">ns: trading</text>

  <rect x="220" y="420" width="120" height="22" rx="4" fill="#4a7fb5" opacity="0.15"/>
  <text x="280" y="436" text-anchor="middle" fill="#4a7fb5" font-size="10" font-weight="600">ns: istio-system</text>

  <rect x="355" y="420" width="120" height="22" rx="4" fill="#4a7fb5" opacity="0.15"/>
  <text x="415" y="436" text-anchor="middle" fill="#4a7fb5" font-size="10" font-weight="600">ns: monitoring</text>

  <!-- Rolling update label -->
  <rect x="85" y="450" width="495" height="30" rx="4" fill="#f0fff4" stroke="#38a169" stroke-width="1"/>
  <text x="332" y="470" text-anchor="middle" fill="#38a169" font-size="10" font-weight="600">Rolling Update: maxSurge=1 maxUnavailable=0 | readiness + liveness + smoke test | auto-rollback</text>

  <!-- ==================== ElastiCache Redis ==================== -->
  <rect x="610" y="225" width="230" height="120" rx="8" fill="white" stroke="#c53030" stroke-width="1.5"/>
  <text x="725" y="245" text-anchor="middle" fill="#c53030" font-weight="700" font-size="12">ElastiCache Redis</text>

  <rect x="625" y="255" width="95" height="40" rx="6" fill="#c53030" filter="url(#s)"/>
  <text x="673" y="275" text-anchor="middle" fill="white" font-weight="600" font-size="11">Primary</text>
  <text x="673" y="289" text-anchor="middle" fill="#fed7d7" font-size="9">r6g.large</text>

  <rect x="730" y="255" width="95" height="40" rx="6" fill="#9b2c2c" filter="url(#s)"/>
  <text x="778" y="275" text-anchor="middle" fill="white" font-weight="600" font-size="11">Replica</text>
  <text x="778" y="289" text-anchor="middle" fill="#fed7d7" font-size="9">r6g.large</text>

  <!-- Arrow: primary ↔ replica -->
  <line x1="722" y1="275" x2="728" y2="275" stroke="#a0aec0" stroke-width="1"/>

  <text x="725" y="315" text-anchor="middle" fill="#718096" font-size="9">auto-failover | multi-AZ | encryption in-transit + at-rest</text>
  <text x="725" y="328" text-anchor="middle" fill="#718096" font-size="9">snapshots 7d retention | maintenance Sun 04:00-06:00 UTC</text>

  <!-- Arrow: pods → Redis -->
  <line x1="502" y1="348" x2="608" y2="275" stroke="#a0aec0" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="555" y="300" fill="#718096" font-size="9">:6379</text>

  <!-- ==================== Monitoring ==================== -->
  <rect x="610" y="365" width="230" height="120" rx="8" fill="white" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="725" y="385" text-anchor="middle" fill="#2d3748" font-weight="700" font-size="12">Monitoring</text>

  <rect x="625" y="395" width="65" height="30" rx="4" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="658" y="414" text-anchor="middle" fill="#2d3748" font-size="10" font-weight="600">Prom</text>

  <rect x="698" y="395" width="65" height="30" rx="4" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="731" y="414" text-anchor="middle" fill="#2d3748" font-size="10" font-weight="600">Grafana</text>

  <rect x="770" y="395" width="55" height="30" rx="4" fill="#edf2f7" stroke="#a0aec0" stroke-width="1"/>
  <text x="798" y="414" text-anchor="middle" fill="#2d3748" font-size="10" font-weight="600">Tempo</text>

  <text x="725" y="450" text-anchor="middle" fill="#718096" font-size="9">CloudWatch Logs 90d retention</text>
  <text x="725" y="463" text-anchor="middle" fill="#718096" font-size="9">SNS → PagerDuty + Slack alerts</text>
  <text x="725" y="476" text-anchor="middle" fill="#718096" font-size="9">SLO: 99.9% availability | p99 &lt; 50ms</text>

  <!-- Arrow: pods → monitoring (scrape) -->
  <line x1="502" y1="360" x2="623" y2="410" stroke="#dd6b20" stroke-width="1" marker-end="url(#ao)"/>
  <text x="555" y="378" fill="#dd6b20" font-size="9" font-weight="600">metrics + traces</text>

  <!-- ==================== CI/CD (outside VPC) ==================== -->
  <rect x="55" y="520" width="800" height="55" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="75" y="542" fill="#2d3748" font-weight="700" font-size="11">CI/CD (GitHub Actions)</text>

  <!-- Pipeline steps -->
  <rect x="230" y="530" width="70" height="24" rx="12" fill="#38a169"/>
  <text x="265" y="546" text-anchor="middle" fill="white" font-size="9" font-weight="600">lint + test</text>

  <line x1="302" y1="542" x2="312" y2="542" stroke="#a0aec0" stroke-width="1" marker-end="url(#a)"/>

  <rect x="317" y="530" width="70" height="24" rx="12" fill="#c53030"/>
  <text x="352" y="546" text-anchor="middle" fill="white" font-size="9" font-weight="600">security</text>

  <line x1="389" y1="542" x2="399" y2="542" stroke="#a0aec0" stroke-width="1" marker-end="url(#a)"/>

  <rect x="404" y="530" width="75" height="24" rx="12" fill="#4a7fb5"/>
  <text x="442" y="546" text-anchor="middle" fill="white" font-size="9" font-weight="600">build + sign</text>

  <line x1="481" y1="542" x2="491" y2="542" stroke="#a0aec0" stroke-width="1" marker-end="url(#a)"/>

  <rect x="496" y="530" width="70" height="24" rx="12" fill="#dd6b20"/>
  <text x="531" y="546" text-anchor="middle" fill="white" font-size="9" font-weight="600">approval</text>

  <line x1="568" y1="542" x2="578" y2="542" stroke="#a0aec0" stroke-width="1" marker-end="url(#a)"/>

  <rect x="583" y="530" width="75" height="24" rx="12" fill="#2d3748"/>
  <text x="621" y="546" text-anchor="middle" fill="white" font-size="9" font-weight="600">rollout</text>

  <line x1="660" y1="542" x2="670" y2="542" stroke="#a0aec0" stroke-width="1" marker-end="url(#a)"/>

  <rect x="675" y="530" width="80" height="24" rx="12" fill="#38a169"/>
  <text x="715" y="546" text-anchor="middle" fill="white" font-size="9" font-weight="600">health check</text>

  <!-- Arrow: CI → EKS (OIDC) -->
  <line x1="621" y1="528" x2="500" y2="490" stroke="#dd6b20" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="575" y="505" fill="#dd6b20" font-size="9" font-weight="600">OIDC → kubectl</text>

  <!-- ==================== Terraform state (outside VPC) ==================== -->
  <rect x="610" y="520" width="22" height="0" rx="0" fill="none"/>

  <!-- S3 + DynamoDB -->
  <rect x="55" y="100" width="0" height="0"/>

  <!-- State management label -->
  <text x="140" y="565" fill="#718096" font-size="10" font-weight="600">Terraform: S3 state + DynamoDB lock | prevent_destroy on VPC/subnets/Redis</text>
</svg>
