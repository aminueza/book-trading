name: Application CI

on:
  push:
    branches: [main, develop]
    paths:
      - "application/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci-application.yml"
      - ".github/workflows/actions/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "application/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci-application.yml"
      - ".github/workflows/actions/**"
  workflow_dispatch:

# Cancel in-progress CI runs for the same branch (not deploy — deploy uses its own group).
# A new push to a PR supersedes the previous run; no point finishing the old one.
concurrency:
  group: ci-app-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/lint
        with:
          go-working-directory: "."

  test:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Run tests with race detector and coverage
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "### Test Coverage: ${TOTAL}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  security:
    name: Container security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/security
        with:
          dockerfile-dir: "."
          category: container-book-trading

  build-image:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    outputs:
      digest: ${{ steps.build.outputs['image-digest'] }}
    steps:
      - uses: actions/checkout@v4

      - id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - id: build
        uses: ./.github/workflows/actions/build
        with:
          context: .
          dockerfile: Dockerfile
          image-name: ${{ steps.image.outputs.name }}
          registry: ghcr.io
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ github.event_name == 'push' && 'true' || 'false' }}
          cache-from: gha
          cache-to: gha

  # Deploy application to production EKS with safe rollout.
  #
  # Infrastructure (VPC, EKS, Redis) is managed by ci-infrastructure.yml.
  # This job only deploys the application via kustomize — it assumes the
  # cluster and dependencies already exist. If both infra and app change
  # in the same PR, merge the infra PR first.
  #
  # Safety model:
  #   - PRs: lint + test + security + build (no deploy).
  #   - Push to main: build + deploy with manual approval gate.
  #   - Image pinned by digest (immutable), not tag.
  #   - Rolling update: maxSurge=1, maxUnavailable=0 (zero-downtime).
  #   - Post-deploy: readiness, liveness, smoke test — auto-rollback on failure.
  #   - Serialized: only one deploy runs at a time (concurrency group).
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-image
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    # Serialize production deploys — never run two in parallel.
    # cancel-in-progress: false means a second deploy queues instead of cancelling the first.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/rollout
        with:
          aws-role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          cluster-name: trading-production
          namespace: trading
          kustomize-overlay: infrastructure/deploy/kubernetes/overlays/production
          image-name: orderbook-service
          image-ref: "ghcr.io/${{ github.repository }}@${{ needs.build-image.outputs.digest }}"
