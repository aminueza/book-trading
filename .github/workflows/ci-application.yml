name: Application CI

on:
  push:
    branches: [main, develop]
    paths:
      - "application/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci-application.yml"
      - ".github/workflows/actions/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "application/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/ci-application.yml"
      - ".github/workflows/actions/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  lint:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/lint
        with:
          go-working-directory: "."

  test:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum
      - run: go test ./...

  security:
    name: Container security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/security
        with:
          dockerfile-dir: "."
          category: container-book-trading

  build-image:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    outputs:
      digest: ${{ steps.build.outputs['image-digest'] }}
    steps:
      - uses: actions/checkout@v4

      - id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - id: build
        uses: ./.github/workflows/actions/build
        with:
          context: .
          dockerfile: Dockerfile
          image-name: ${{ steps.image.outputs.name }}
          registry: ghcr.io
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ github.event_name == 'push' && 'true' || 'false' }}
          cache-from: gha
          cache-to: gha

