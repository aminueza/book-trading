# Infrastructure CI — Terraform changes to VPC, EKS, Redis, monitoring.
#
# Pipeline: security scan → plan (PR) or apply (main).
#
# The security job runs tfsec + checkov against the HCL files *before*
# any cloud credentials are used. This catches misconfigurations (open
# security groups, public buckets, disabled encryption) in code review,
# not after the infrastructure is live.
#
# Separation from ci-application.yml:
#   Infrastructure changes must be deployed BEFORE application changes
#   that depend on them. This workflow runs independently so infra can
#   be updated without rebuilding the app.

name: Infrastructure CI

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/ci-infrastructure.yml"
      - ".github/workflows/actions/deploy/**"
      - ".github/workflows/actions/infra-security/**"
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/ci-infrastructure.yml"
      - ".github/workflows/actions/deploy/**"
      - ".github/workflows/actions/infra-security/**"
  workflow_dispatch:

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  # Security scan — runs on every push and PR, no cloud credentials needed.
  # Must pass before plan or apply can proceed.
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/infra-security
        with:
          working-directory: infrastructure/terraform/environments/production
          severity: HIGH

  # Plan on PRs — posts diff as PR comment so reviewers see what changes.
  plan:
    name: Plan (production)
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/workflows/actions/deploy
        id: tf
        with:
          working-directory: infrastructure/terraform/environments/production
          aws-role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          plan-only: "true"

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const exitcode = '${{ steps.tf.outputs.plan-exitcode }}';
            const status = exitcode === '0' ? 'No changes' : exitcode === '2' ? 'Changes detected' : 'Error';
            const body = `### Terraform Plan: ${status}\n\nSee [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for full plan output.\n\n_Plan exit code: ${exitcode}_`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Apply on merge to main — security must have passed on the PR.
  # Serialized: only one infra apply runs at a time.
  apply:
    name: Apply (production)
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    concurrency:
      group: infra-apply-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/workflows/actions/deploy
        with:
          working-directory: infrastructure/terraform/environments/production
          aws-role-arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          plan-only: "false"
