# golangci-lint configuration.
# Explicitly enabled linters rather than relying on defaults to make
# the linting policy auditable and reproducible across CI and local runs.

run:
  timeout: 5m

linters:
  enable:
    - errcheck       # Unchecked error returns
    - govet          # Suspicious constructs (printf format strings, struct tags)
    - staticcheck    # Advanced static analysis (SA*, S1*, ST1*, QF*)
    - unused         # Unused variables, functions, types
    - gosimple       # Simplifications (e.g., redundant nil checks)
    - ineffassign    # Assignments to variables that are never read
    - typecheck      # Type-checking errors
    - misspell       # Spelling mistakes in comments and strings
    - gocritic       # Opinionated diagnostics and performance hints
    - gosec          # Security-focused static analysis (G101-G601)
    - bodyclose      # Unclosed HTTP response bodies
    - noctx          # HTTP requests without context.Context

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
  errcheck:
    check-type-assertions: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 5
