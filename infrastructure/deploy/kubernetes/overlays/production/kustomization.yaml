apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading

resources:
  - ../../base
  - ../../base/prometheusrule.yaml

# Production image — pinned to a specific digest in real deployments.
images:
  - name: orderbook-service
    newName: registry.internal/trading/orderbook-service
    newTag: "v1.0.0"

# Production-specific patches.
patches:
  # Scale up for production traffic.
  - target:
      kind: Deployment
      name: orderbook
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  # Tighter HPA for production.
  - target:
      kind: HorizontalPodAutoscaler
      name: orderbook
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 20

  # Higher PDB for production.
  - target:
      kind: PodDisruptionBudget
      name: orderbook
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 3

configMapGenerator:
  - name: orderbook-config
    behavior: merge
    literals:
      - LOG_LEVEL=warn
      - REDIS_ADDR=redis-master.trading.svc.cluster.local:6379
