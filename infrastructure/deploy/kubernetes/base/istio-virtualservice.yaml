# Routes external HTTP from orderbook-gateway to the orderbook ClusterIP service.
# Service port 80 maps to container 8080 (see service.yaml).
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: orderbook
  labels:
    app.kubernetes.io/name: orderbook
    app.kubernetes.io/component: virtualservice
spec:
  hosts:
    - "*"
  gateways:
    - orderbook-gateway
  http:
    - name: orderbook-api
      match:
        - uri:
            prefix: /
      route:
        - destination:
            host: orderbook
            port:
              number: 80
