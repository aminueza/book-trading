apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: orderbook-gateway
  labels:
    app.kubernetes.io/name: orderbook
    app.kubernetes.io/component: gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
