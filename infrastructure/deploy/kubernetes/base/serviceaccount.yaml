# Dedicated service account with automountServiceAccountToken disabled in
# the pod spec. The order book service does not need to talk to the
# Kubernetes API, so we don't mount a token. This limits the blast radius
# if the container is compromised.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orderbook
  namespace: trading
  labels:
    app.kubernetes.io/name: orderbook
