apiVersion: v1
kind: Service
metadata:
  name: orderbook
  namespace: trading
  labels:
    app.kubernetes.io/name: orderbook
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: orderbook
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
