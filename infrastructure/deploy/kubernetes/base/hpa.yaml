# HorizontalPodAutoscaler scales based on CPU utilization.
#
# Design decisions:
#   - Min 3 replicas: Ensures HA even during low traffic.
#   - Max 10 replicas: Caps cost and prevents runaway scaling from
#     feedback loops (e.g., a retry storm that generates more load
#     as we scale up).
#   - Target 70% CPU: Leaves headroom for traffic spikes. At 70% average,
#     individual pods may be at 90% due to uneven load distribution.
#   - Scale-down stabilization (300s): Prevents flapping during
#     intermittent load patterns. Trading traffic is often bursty.
#
# In production, we would also scale on custom metrics:
#   - http_requests_in_flight (better proxy for saturation)
#   - p99 latency (scale before users notice degradation)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orderbook
  namespace: trading
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orderbook
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
