# NetworkPolicy implements least-privilege networking:
#   - Ingress: Only from the Istio ingress gateway (istio-system) on port 8080,
#     and from Prometheus on port 9090.
#   - Egress: Only to Redis (port 6379) and DNS (port 53).
#
# This prevents lateral movement if the container is compromised. An
# attacker cannot reach other services, exfiltrate data to the internet,
# or scan the internal network.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orderbook
  namespace: trading
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orderbook
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Istio ingress gateway pods (default install: istio-system).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              istio: ingressgateway
      ports:
        - port: 8080
          protocol: TCP
    # Allow Prometheus scraping.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
  egress:
    # Allow Redis access.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
          protocol: TCP
    # Allow DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
