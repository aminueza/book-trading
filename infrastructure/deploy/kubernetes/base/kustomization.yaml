apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading

commonLabels:
  app.kubernetes.io/part-of: trading-platform
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml
  - istio-gateway.yaml
  - istio-virtualservice.yaml
  - servicemonitor.yaml
  # prometheusrule.yaml is not in base because KinD lacks the CRD.
  # Production overlay includes it directly.
