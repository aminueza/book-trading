# ServiceMonitor for Prometheus Operator. Automatically configures Prometheus
# to scrape the /metrics endpoint on port 9090.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orderbook
  namespace: trading
  labels:
    app.kubernetes.io/name: orderbook
    release: prometheus  # Match Prometheus Operator's serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: orderbook
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
  namespaceSelector:
    matchNames:
      - trading
